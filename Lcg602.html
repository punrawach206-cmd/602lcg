<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ส่งงาน ม.6/2</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Kanit:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
:root{
  --g1:#0a5c2e;--g2:#0f7a3e;--g3:#14a053;--g4:#1bc96a;--g5:#4ddb8c;
  --g6:#a8f0cc;--g7:#d4f9e8;--g8:#edfcf4;
  --text-dark:#062918;--text-mid:#1a6640;--text-muted:#5a9e78;
  --border:rgba(20,160,83,0.25);
}
*{box-sizing:border-box;margin:0;padding:0}

@keyframes fadeSlideIn{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(27,201,106,0.5)}70%{box-shadow:0 0 0 14px rgba(27,201,106,0)}100%{box-shadow:0 0 0 0 rgba(27,201,106,0)}}
@keyframes leafSway{0%,100%{transform:rotate(-3deg) scale(1)}50%{transform:rotate(3deg) scale(1.04)}}
@keyframes photoReveal{from{opacity:0;transform:scale(0.85) rotate(-4deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
@keyframes checkPop{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes bgMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes particleFly{0%{opacity:1;transform:translateY(0) translateX(0) scale(1)}100%{opacity:0;transform:translateY(-120px) translateX(var(--tx)) scale(0.2)}}
@keyframes slideDown{from{opacity:0;max-height:0;transform:translateY(-10px)}to{opacity:1;max-height:200px;transform:translateY(0)}}
@keyframes emailPop{from{opacity:0;transform:scale(0.9) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#f0fdf5 0%,#e0f8ee 30%,#cdf5e0 60%,#f0fdf5 100%);
  background-size:300% 300%;
  animation:bgMove 14s ease infinite;
  font-family:'Sarabun',sans-serif;
  color:var(--text-dark);
  display:flex;align-items:center;justify-content:center;
  padding:24px 16px;overflow-x:hidden;
}
body::before,body::after{content:'';position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
body::before{width:500px;height:500px;top:-150px;left:-150px;background:radial-gradient(circle,rgba(20,160,83,0.1) 0%,transparent 70%);}
body::after{width:400px;height:400px;bottom:-100px;right:-100px;background:radial-gradient(circle,rgba(77,219,140,0.09) 0%,transparent 70%);}

.leaf{position:fixed;font-size:1.4rem;opacity:0.1;pointer-events:none;z-index:0;animation:leafSway 4s ease-in-out infinite;}
.leaf:nth-child(1){top:8%;left:5%;animation-delay:0s}
.leaf:nth-child(2){top:15%;right:8%;animation-delay:1s;font-size:1rem}
.leaf:nth-child(3){top:70%;left:3%;animation-delay:2s;font-size:1.8rem}
.leaf:nth-child(4){bottom:10%;right:5%;animation-delay:.5s}
.leaf:nth-child(5){top:45%;right:2%;animation-delay:1.5s;font-size:1rem}

.wrapper{width:100%;max-width:660px;position:relative;z-index:1;animation:fadeSlideIn .7s cubic-bezier(.22,.68,0,1.4) both;}

.header{text-align:center;margin-bottom:28px;}
.logo-ring{width:80px;height:80px;background:linear-gradient(135deg,var(--g2),var(--g4));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 16px;animation:floatUp 3s ease-in-out infinite,pulseRing 2.5s ease-out 1s infinite;box-shadow:0 8px 32px rgba(10,92,46,0.25);}
.badge{display:inline-block;background:linear-gradient(90deg,var(--g2),var(--g3));color:#fff;font-family:'Kanit',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;padding:5px 18px;border-radius:20px;margin-bottom:10px;box-shadow:0 2px 12px rgba(10,92,46,0.25);}
h1{font-family:'Kanit',sans-serif;font-size:2.2rem;font-weight:800;color:var(--g1);line-height:1.15;margin-bottom:6px;}
h1 em{color:var(--g3);font-style:normal;}
.subtitle{color:var(--text-muted);font-size:.9rem;}

.card{background:rgba(255,255,255,0.93);backdrop-filter:blur(12px);border:1.5px solid rgba(20,160,83,0.2);border-radius:24px;padding:32px;box-shadow:0 8px 40px rgba(10,92,46,0.1),0 2px 8px rgba(10,92,46,0.06);position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--g1),var(--g3),var(--g5),var(--g3),var(--g1));background-size:200% 100%;animation:bgMove 4s linear infinite;}

.slabel{font-size:.75rem;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.slabel::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(20,160,83,0.2),transparent);}

.sel-wrap{position:relative;}
select{width:100%;appearance:none;-webkit-appearance:none;background:#fff;border:1.5px solid rgba(20,160,83,0.3);border-radius:14px;color:var(--text-dark);font-family:'Sarabun',sans-serif;font-size:1rem;padding:13px 44px 13px 18px;outline:none;cursor:pointer;transition:border-color .25s,box-shadow .25s,transform .15s;}
select:focus{border-color:var(--g3);box-shadow:0 0 0 4px rgba(20,160,83,0.12);transform:translateY(-1px);}
.sel-arr{position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--g3);font-size:1.1rem;transition:transform .3s;}
select:focus + .sel-arr{transform:translateY(-50%) rotate(180deg);}

/* Info card with photo */
.info-card{display:none;background:linear-gradient(135deg,#f0fdf5,#e0f8ec);border:1.5px solid rgba(20,160,83,0.2);border-radius:18px;padding:18px 20px;margin-top:14px;gap:18px;align-items:center;overflow:hidden;position:relative;}
.info-card.vis{display:flex;animation:slideDown .4s cubic-bezier(.22,.68,0,1.2) both;}
.info-card::after{content:'';position:absolute;top:-40%;right:-20%;width:180px;height:180px;background:radial-gradient(circle,rgba(77,219,140,0.12),transparent 70%);pointer-events:none;}

.photo-frame{position:relative;flex-shrink:0;width:88px;height:88px;}
.photo-frame::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:linear-gradient(135deg,var(--g3),var(--g5));z-index:0;animation:pulseRing 2.2s ease-out infinite;}
.photo-img{width:88px;height:88px;border-radius:50%;object-fit:cover;position:relative;z-index:1;border:3px solid #fff;animation:photoReveal .5s cubic-bezier(.22,.68,0,1.4) both;box-shadow:0 4px 16px rgba(10,92,46,0.2);display:block;}

.info-text{flex:1;min-width:0;}
.info-no{font-size:.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:3px;}
.info-name{font-family:'Kanit',sans-serif;font-size:1.05rem;font-weight:700;color:var(--g1);}
.info-pills{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;}
.pill{background:rgba(20,160,83,0.1);color:var(--g2);font-size:.73rem;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid rgba(20,160,83,0.2);}

/* Email block */
.email-block{margin-top:10px;animation:emailPop .35s cubic-bezier(.22,.68,0,1.4) .1s both;}
.email-link{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,#fff,#f0fdf5);
  border:1.5px solid rgba(20,160,83,0.3);
  border-radius:10px;
  padding:8px 14px;
  text-decoration:none;
  color:var(--g1);
  font-size:.85rem;font-weight:600;
  transition:all .2s;
  box-shadow:0 2px 8px rgba(10,92,46,0.08);
  cursor:pointer;
}
.email-link:hover{background:linear-gradient(135deg,var(--g7),var(--g8));border-color:var(--g3);box-shadow:0 4px 16px rgba(10,92,46,0.15);transform:translateY(-1px);}
.email-icon{font-size:1rem;}
.email-addr{font-family:'Kanit',sans-serif;font-size:.8rem;color:var(--g2);}

.divider{border:none;border-top:1px dashed rgba(20,160,83,0.2);margin:24px 0;}

.ghdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.btn-tiny{background:transparent;border:1px solid rgba(20,160,83,0.3);border-radius:8px;color:var(--text-muted);font-family:'Sarabun',sans-serif;font-size:.78rem;padding:4px 12px;cursor:pointer;transition:all .2s;}
.btn-tiny:hover{border-color:var(--g3);color:var(--g2);}
.acnt{font-size:.8rem;color:var(--text-muted);}
.acnt b{color:var(--g2);font-weight:700;}

.agrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:480px){.agrid{grid-template-columns:1fr}}

.aitem{background:#f7fdf9;border:1.5px solid rgba(20,160,83,0.15);border-radius:12px;padding:13px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .22s cubic-bezier(.22,.68,0,1.4);user-select:none;position:relative;overflow:hidden;}
.aitem::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(27,201,106,0.07),transparent);opacity:0;transition:opacity .2s;}
.aitem:hover{border-color:rgba(20,160,83,0.35);transform:translateY(-2px) scale(1.01);box-shadow:0 4px 16px rgba(10,92,46,0.1);}
.aitem:hover::after,.aitem.on::after{opacity:1;}
.aitem.on{background:linear-gradient(135deg,#e8faf0,#d4f5e2);border-color:var(--g3);transform:translateY(-2px);box-shadow:0 4px 20px rgba(20,160,83,0.18);}

.cb{width:24px;height:24px;border-radius:7px;border:2px solid rgba(20,160,83,0.3);background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0;color:#fff;transition:all .22s;}
.aitem.on .cb{background:linear-gradient(135deg,var(--g2),var(--g4));border-color:transparent;font-size:.85rem;animation:checkPop .3s cubic-bezier(.22,.68,0,1.4);box-shadow:0 2px 8px rgba(20,160,83,0.35);}
.aitem input[type=checkbox]{display:none}
.anum{font-size:.72rem;font-weight:700;color:var(--text-muted);background:rgba(20,160,83,0.1);border-radius:5px;padding:1px 6px;}
.aitem.on .anum{background:rgba(20,160,83,0.2);color:var(--g2);}
.albl{font-size:.92rem;font-weight:600;color:var(--text-mid);}
.aitem.on .albl{color:var(--g1);}

.btn-submit{width:100%;background:linear-gradient(135deg,var(--g1) 0%,var(--g2) 40%,var(--g3) 100%);background-size:200% 200%;color:#fff;border:none;border-radius:16px;font-family:'Kanit',sans-serif;font-size:1.15rem;font-weight:700;padding:16px 24px;cursor:pointer;letter-spacing:.5px;margin-top:10px;transition:transform .18s,box-shadow .25s;box-shadow:0 6px 28px rgba(10,92,46,0.3);position:relative;overflow:hidden;animation:bgMove 4s ease infinite;}
.btn-submit::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);transition:left .5s;}
.btn-submit:hover:not(:disabled)::before{left:100%;}
.btn-submit:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 36px rgba(10,92,46,0.38);}
.btn-submit:active:not(:disabled){transform:translateY(0) scale(.99);}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;}

#particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;}
.pt{position:absolute;border-radius:50%;--tx:0px;animation:particleFly .9s ease-out forwards;}
</style>
</head>
<body>
<div class="leaf">🌿</div><div class="leaf">🍃</div><div class="leaf">🌱</div><div class="leaf">🍀</div><div class="leaf">🌿</div>
<div id="particles"></div>

<div class="wrapper">
  <div class="header">
    <div class="logo-ring">📚</div>
    <div class="badge">ระบบส่งงานออนไลน์</div>
    <h1>ชั้นมัธยมศึกษาปีที่ <em>6/2</em></h1>
    <p class="subtitle">เลือกชื่อของท่านและงานที่ต้องการส่ง</p>
  </div>

  <div class="card">
    <div class="slabel">นักเรียน</div>
    <div class="sel-wrap">
      <select id="ssel" onchange="onSel()">
        <option value="" disabled selected>— กรุณาเลือกชื่อ-นามสกุล —</option>
      </select>
      <span class="sel-arr">▾</span>
    </div>

    <div class="info-card" id="infoCard">
      <div class="photo-frame">
        <img class="photo-img" id="pimg" src="" alt="รูปนักเรียน">
      </div>
      <div class="info-text">
        <div class="info-no" id="ino"></div>
        <div class="info-name" id="iname"></div>
        <div class="info-pills">
          <span class="pill">📚 ม.6/2</span>
          <span class="pill" id="iid"></span>
        </div>
        <div class="email-block" id="emailBlock"></div>
      </div>
    </div>

    <hr class="divider">

    <div class="ghdr">
      <div class="slabel" style="margin-bottom:0">งานที่ต้องการส่ง</div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn-tiny" onclick="selAll()">เลือกทั้งหมด</button>
        <button class="btn-tiny" onclick="clrAll()">ล้าง</button>
        <span class="acnt">เลือก <b id="cnt">0</b>/6</span>
      </div>
    </div>
    <div class="agrid" id="agrid"></div>

    <button class="btn-submit" id="sbtn" onclick="doSubmit()">✉️ &nbsp;ส่งงาน</button>
  </div>
</div>

// Populate select
const ss = document.getElementById('ssel');
students.forEach(s=>{
  const o=document.createElement('option');
  o.value=s.id; o.textContent=`${s.no}. ${s.name}`; ss.appendChild(o);
});

// Build assign grid
const ag=document.getElementById('agrid');
JOBS.forEach((j,i)=>{
  const d=document.createElement('div');
  d.className='aitem'; d.id=`ai${i}`;
  d.innerHTML=`<div class="cb" id="cb${i}">✓</div><span class="anum">${i+1}</span><span class="albl">${j}</span><input type="checkbox" id="ck${i}" value="${j}">`;
  d.onclick=()=>tgl(i);
  ag.appendChild(d);
});

function tgl(i){const ck=document.getElementById(`ck${i}`);ck.checked=!ck.checked;document.getElementById(`ai${i}`).classList.toggle('on',ck.checked);upc();}
function upc(){document.getElementById('cnt').textContent=ag.querySelectorAll('input:checked').length;}
function selAll(){JOBS.forEach((_,i)=>{document.getElementById(`ck${i}`).checked=true;document.getElementById(`ai${i}`).classList.add('on');});upc();}
function clrAll(){JOBS.forEach((_,i)=>{document.getElementById(`ck${i}`).checked=false;document.getElementById(`ai${i}`).classList.remove('on');});upc();}

function onSel(){
  const s=students.find(x=>x.id===ss.value);
  if(!s) return;
  document.getElementById('ino').textContent=`เลขที่ ${s.no}`;
  document.getElementById('iname').textContent=s.name;
  document.getElementById('iid').textContent=`รหัส ${s.id}`;
  document.getElementById('pimg').src=s.photo;
  // Email button
  const eb=document.getElementById('emailBlock');
  eb.innerHTML=`<a class="email-link" href="mailto:${s.email}" title="ส่งอีเมลถึง ${s.name}">
    <span class="email-icon">✉️</span>
    <span class="email-addr">${s.email}</span>
  </a>`;
  const ic=document.getElementById('infoCard');
  ic.classList.remove('vis');
  requestAnimationFrame(()=>ic.classList.add('vis'));
}

function burst(x,y){
  const colors=['#1bc96a','#4ddb8c','#0f7a3e','#a8f0cc','#14a053','#d4f9e8'];
  const p=document.getElementById('particles');
  for(let i=0;i<20;i++){
    const d=document.createElement('div');
    d.className='pt';
    const tx=(Math.random()-.5)*180;
    const sz=5+Math.random()*9;
    d.style.cssText=`left:${x}px;top:${y}px;background:${colors[i%colors.length]};--tx:${tx}px;animation-delay:${Math.random()*.15}s;width:${sz}px;height:${sz}px`;
    p.appendChild(d);
    setTimeout(()=>d.remove(),1100);
  }
}

function doSubmit(){
  const id=ss.value;
  if(!id){Swal.fire({icon:'warning',title:'แจ้งเตือน',text:'กรุณาเลือกชื่อนักเรียนก่อนครับ',background:'#fff',confirmButtonColor:'#0f7a3e'});return;}
  const checked=Array.from(ag.querySelectorAll('input:checked')).map(c=>c.value);
  if(!checked.length){Swal.fire({icon:'warning',title:'แจ้งเตือน',text:'กรุณาเลือกงานอย่างน้อย 1 ชิ้น',background:'#fff',confirmButtonColor:'#0f7a3e'});return;}
  const student=students.find(s=>s.id===id);
  const btn=document.getElementById('sbtn');
  const r=btn.getBoundingClientRect();
  burst(r.left+r.width/2,r.top+r.height/2);
  Swal.fire({title:'<span style="color:#0a5c2e">กำลังบันทึก...</span>',html:'<div style="color:#5a9e78;font-size:.95rem">กรุณารอสักครู่</div>',allowOutsideClick:false,allowEscapeKey:false,didOpen:()=>Swal.showLoading(),background:'#f0fdf5'});
  const cb='cb_'+Date.now();
  const pl={action:'submitJob',studentId:student.id,studentName:student.name,studentNo:student.no,room:'ม.6/2',email:student.email,assignments:checked.join(','),timestamp:new Date().toLocaleString('th-TH'),callback:cb};
  const qs=Object.entries(pl).map(([k,v])=>`${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
  const tmr=setTimeout(()=>{cleanup();Swal.fire({icon:'error',title:'หมดเวลา',text:'ไม่ได้รับการตอบกลับ กรุณาลองใหม่',background:'#fff',confirmButtonColor:'#0f7a3e'});},15000);
  window[cb]=function(data){
    clearTimeout(tmr);cleanup();
    if(data&&data.status==='success'){
      burst(r.left+r.width/2,r.top+r.height/2);
      setTimeout(()=>burst(r.left+r.width/2,r.top+r.height/2),200);
      Swal.fire({icon:'success',title:'<span style="color:#0a5c2e">ส่งงานสำเร็จ! 🎉</span>',html:`<div style="font-size:.95rem;color:#5a9e78;line-height:1.8"><strong style="color:#0a5c2e">${student.name}</strong><br>อีเมล: <span style="color:#0f7a3e">${student.email}</span><br>ส่งงาน: <span style="color:#0f7a3e;font-weight:700">${checked.join(', ')}</span></div>`,confirmButtonText:'ตกลง',background:'#f0fdf5',confirmButtonColor:'#0f7a3e',timer:5000,timerProgressBar:true});
      clrAll();
    }else{
      Swal.fire({icon:'error',title:'เกิดข้อผิดพลาด',text:(data&&data.message)||'บันทึกไม่สำเร็จ',background:'#fff',confirmButtonColor:'#0f7a3e'});
    }
  };
  function cleanup(){delete window[cb];const s=document.getElementById('_jp');if(s)s.remove();}
  const sc=document.createElement('script');sc.id='_jp';sc.src=`${SCRIPT_URL}?${qs}`;
  sc.onerror=()=>{clearTimeout(tmr);cleanup();Swal.fire({icon:'error',title:'เชื่อมต่อไม่ได้',text:'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้',background:'#fff',confirmButtonColor:'#0f7a3e'});};
  document.body.appendChild(sc);
}
</script>
</body>
</html>
